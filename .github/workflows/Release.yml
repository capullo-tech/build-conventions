name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v1.0.0 - cut a catalog release

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
      # Libraries publish via jitpack, which builds a tag on first request. Warm it so consumers
      # that re-pin to this tag don't eat the first-build latency. Best-effort - never fails the release.
      - name: Warm jitpack build for the tag (best-effort)
        run: |
          tag="${{ github.ref_name }}"
          curl -sSf --max-time 300 \
            "https://jitpack.io/com/github/capullo-tech/build-conventions/${tag}/build-conventions-${tag}.toml" \
            -o /dev/null \
            || echo "jitpack warm did not complete; jitpack still builds on the first consumer request."
